<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B8EA8"/>
      <stop offset="100%" stop-color="#BBA8C8"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Capsule / Pill body -->
  <rect x="51" y="72" width="90" height="56" rx="28" fill="white" fill-opacity="0.95"/>

  <!-- Capsule divider line -->
